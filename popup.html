<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 18px;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            text-align: center;
            background: #f7f8fa;
            color: #222;
        }
        h2 { margin: 0 0 18px 0; font-size: 18px; }
        #capture-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #capture-btn:hover { background: #45a049; }
        #capture-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #capture-table-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #capture-table-btn:hover { background: #1976D2; }
        #capture-table-btn:disabled { background: #ccc; cursor: not-allowed; }

        #status {
            margin-top: 15px;
            min-height: 18px;
            font-size: 13px;
            color: #666;
        }

        .support-box {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #e5e7eb;
        }

        .support-text {
            margin: 0 0 10px;
            font-size: 13px;
            line-height: 1.5;
            color: #555;
        }

        #paypal-link {
            display: inline-block;
            margin-top: 6px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #0070ba;
            border-radius: 8px;
            text-decoration: none;
        }

        #paypal-link:hover {
            background: #005a96;
        }

        .language-selector {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .language-selector label {
            font-size: 13px;
            color: #555;
        }

        #language-select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #d0d7de;
            font-size: 13px;
            cursor: pointer;
            background: white;
        }

        #language-select:focus {
            outline: none;
            border-color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <label for="language-select">🌐</label>
        <select id="language-select">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
            <option value="de-DE">Deutsch</option>
            <option value="fr-FR">Français</option>
            <option value="es-ES">Español</option>
            <option value="ja-JP">日本語</option>
            <option value="ko-KR">한국어</option>
            <option value="ru-RU">Русский</option>
        </select>
    </div>
    <h2 id="main-title">📸 截图翻译与表格</h2>
    <button id="capture-btn">🖱️ 截图并翻译</button>
    <button id="capture-table-btn">📊 截取表格转Excel</button>
    <div id="status"></div>
    <div class="support-box">
        <p class="support-text" id="support-text">如果这个插件对你有帮助，欢迎支持一下。</p>
        <a id="paypal-link" href="https://www.paypal.me/xuxinkuan" target="_blank">☕ PayPal</a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
